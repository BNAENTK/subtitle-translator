<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 실시간 자막 번역기</title>
<style>
  :root {
    --bg: #0a0a0f;
    --border: rgba(255,255,255,0.10);
    --accent: #00e5ff;
    --accent2: #7b61ff;
    --text: #f0f0f0;
    --muted: rgba(255,255,255,0.45);
    --danger: #ff4d6d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  /* ── SETUP ── */
  #setupScreen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 1.5rem;
  }
  .setup-card {
    width: 100%; max-width: 540px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 1.8rem;
  }
  .setup-card h1 { font-size: 19px; font-weight: 700; margin-bottom: 4px; }
  .desc { font-size: 12px; color: var(--muted); margin-bottom: 1.4rem; line-height: 1.7; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px;
    background: rgba(0,229,255,0.12); color: var(--accent); border: 1px solid rgba(0,229,255,0.3);
    margin-bottom: 1.4rem;
  }
  .sec-label { font-size: 11px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 7px; }
  .lang-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.4rem; }
  .lang-pill {
    padding: 5px 11px; border-radius: 20px; font-size: 12px; cursor: pointer;
    border: 1px solid var(--border); color: var(--muted); transition: all 0.15s; user-select: none;
  }
  .lang-pill.on { background: rgba(0,229,255,0.1); border-color: var(--accent); color: var(--accent); }
  .layout-row { display: flex; gap: 8px; margin-bottom: 1.4rem; }
  .lbtn {
    flex: 1; padding: 8px; border-radius: 8px; font-size: 12px; cursor: pointer;
    border: 1px solid var(--border); color: var(--muted); text-align: center; transition: all 0.15s;
  }
  .lbtn.on { background: rgba(123,97,255,0.15); border-color: var(--accent2); color: var(--accent2); }
  .go-btn {
    width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #000; cursor: pointer;
  }
  .go-btn:hover { opacity: 0.88; }
  .note { font-size: 11px; color: var(--muted); text-align: center; margin-top: 10px; line-height: 1.7; }

  /* ── OVERLAY ── */
  #overlayScreen { display: none; min-height: 100vh; }

  #topBar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,15,0.94); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 7px 14px; display: flex; align-items: center; gap: 9px;
  }
  #micBtn {
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
    background: rgba(255,255,255,0.05); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  #micBtn.on { background: rgba(255,77,109,0.18); border-color: var(--danger); }
  #micBtn svg { width: 16px; height: 16px; stroke: var(--text); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .rdot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .rdot.live { background: var(--danger); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #stLabel { font-size: 12px; color: var(--muted); flex: 1; }
  .tbtn {
    padding: 4px 11px; border-radius: 6px; font-size: 11px; cursor: pointer;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted);
  }
  .tbtn:hover { background: rgba(255,255,255,0.09); }

  #subtitleArea { padding-top: 54px; }
  #korBox { padding: 10px 14px 8px; border-bottom: 1px solid var(--border); }
  #korLabel { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
  #korText { font-size: 17px; font-weight: 600; line-height: 1.45; min-height: 26px; }
  #korText .itr { opacity: 0.4; }

  #subsWrap { padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
  #overlayScreen.grid #subsWrap { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

  .sc {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 12px;
    display: flex; align-items: flex-start; gap: 9px; min-height: 50px;
    transition: background 0.4s;
  }
  .sc.flash { background: rgba(0,229,255,0.08); }
  .sc-flag { font-size: 17px; line-height: 1.4; flex-shrink: 0; }
  .sc-body { flex: 1; min-width: 0; }
  .sc-name { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .sc-text { font-size: 15px; font-weight: 500; line-height: 1.4; word-break: break-word; }
  .sc-text.wait { color: var(--muted); font-size: 12px; font-style: italic; }

  /* broadcast mode: transparent bg */
  body.bcast { background: transparent !important; }
  body.bcast #overlayScreen { background: transparent; }
  body.bcast #topBar, body.bcast #korBox { display: none; }
  body.bcast #subtitleArea { padding-top: 0; }
  body.bcast .sc { background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); border-color: rgba(255,255,255,0.08); }
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setupScreen">
  <div class="setup-card">
    <h1>🎙 한국어 실시간 자막 번역기</h1>
    <p class="desc">한국어로 말하면 선택한 언어로 실시간 자막이 표시됩니다.<br>틱톡 라이브 스튜디오 브라우저 소스로 방송 화면에 바로 띄울 수 있습니다.</p>
    <span class="badge">✓ API 키 불필요 — Google 번역 무료 사용</span>

    <div class="sec-label">번역 언어 선택 (여러 개 가능)</div>
    <div class="lang-grid" id="setupLangGrid"></div>

    <div class="sec-label">자막 레이아웃</div>
    <div class="layout-row">
      <div class="lbtn on" data-l="stack" onclick="pickLayout(this)">📋 세로 목록</div>
      <div class="lbtn" data-l="grid" onclick="pickLayout(this)">▦ 2열 그리드</div>
    </div>

    <button class="go-btn" onclick="goLive()">방송 시작 →</button>
    <p class="note">Chrome · Edge 권장 &nbsp;|&nbsp; 마이크 권한 허용 필요<br>틱톡 라이브 스튜디오: 소스 추가 → 브라우저 소스 → 이 HTML 파일 경로 입력</p>
  </div>
</div>

<!-- ══ OVERLAY ══ -->
<div id="overlayScreen">
  <div id="topBar">
    <button id="micBtn" onclick="toggleRec()">
      <svg viewBox="0 0 24 24">
        <rect x="9" y="2" width="6" height="13" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <div class="rdot" id="rdot"></div>
    <span id="stLabel">준비 완료</span>
    <button class="tbtn" onclick="clearAll()">초기화</button>
    <button class="tbtn" onclick="goSetup()">설정</button>
  </div>
  <div id="subtitleArea">
    <div id="korBox">
      <div id="korLabel">🇰🇷 한국어 인식</div>
      <div id="korText"><span style="color:rgba(255,255,255,0.2);font-weight:400;font-size:13px;">마이크 버튼을 눌러 시작하세요</span></div>
    </div>
    <div id="subsWrap"></div>
  </div>
</div>

<script>
const LANGS = [
  {code:'en',   gt:'en',    name:'영어',          flag:'🇺🇸'},
  {code:'ja',   gt:'ja',    name:'일본어',         flag:'🇯🇵'},
  {code:'zh',   gt:'zh-CN', name:'중국어(간체)',   flag:'🇨🇳'},
  {code:'zh-TW',gt:'zh-TW', name:'중국어(번체)',   flag:'🇹🇼'},
  {code:'es',   gt:'es',    name:'스페인어',       flag:'🇪🇸'},
  {code:'fr',   gt:'fr',    name:'프랑스어',       flag:'🇫🇷'},
  {code:'de',   gt:'de',    name:'독일어',         flag:'🇩🇪'},
  {code:'ru',   gt:'ru',    name:'러시아어',       flag:'🇷🇺'},
  {code:'pt',   gt:'pt',    name:'포르투갈어',     flag:'🇧🇷'},
  {code:'ar',   gt:'ar',    name:'아랍어',         flag:'🇸🇦'},
  {code:'it',   gt:'it',    name:'이탈리아어',     flag:'🇮🇹'},
  {code:'vi',   gt:'vi',    name:'베트남어',       flag:'🇻🇳'},
  {code:'th',   gt:'th',    name:'태국어',         flag:'🇹🇭'},
  {code:'id',   gt:'id',    name:'인도네시아어',   flag:'🇮🇩'},
  {code:'hi',   gt:'hi',    name:'힌디어',         flag:'🇮🇳'},
  {code:'tr',   gt:'tr',    name:'터키어',         flag:'🇹🇷'},
];

let sel = new Set(['en','ja','zh']);
let layout = 'stack';
let recog = null, isRec = false, finalTxt = '', debounce = null;

// build lang pills
const sg = document.getElementById('setupLangGrid');
LANGS.forEach(l => {
  const p = document.createElement('div');
  p.className = 'lang-pill' + (sel.has(l.code) ? ' on' : '');
  p.textContent = l.flag + ' ' + l.name;
  p.onclick = () => {
    sel.has(l.code) ? sel.delete(l.code) : sel.add(l.code);
    p.classList.toggle('on', sel.has(l.code));
  };
  sg.appendChild(p);
});

function pickLayout(el) {
  document.querySelectorAll('.lbtn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  layout = el.dataset.l;
}

function goLive() {
  if (sel.size === 0) { alert('번역 언어를 하나 이상 선택해 주세요'); return; }
  document.getElementById('setupScreen').style.display = 'none';
  const ov = document.getElementById('overlayScreen');
  ov.style.display = 'block';
  ov.className = layout === 'grid' ? 'grid' : '';
  buildCards();
}

function goSetup() {
  stopRec();
  document.getElementById('overlayScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'flex';
}

function buildCards() {
  const w = document.getElementById('subsWrap');
  w.innerHTML = '';
  sel.forEach(code => {
    const l = LANGS.find(x => x.code === code);
    if (!l) return;
    const d = document.createElement('div');
    d.className = 'sc'; d.id = 'sc-' + code;
    d.innerHTML = `<div class="sc-flag">${l.flag}</div><div class="sc-body"><div class="sc-name">${l.name}</div><div class="sc-text" id="t-${code}"></div></div>`;
    w.appendChild(d);
  });
}

// Google Translate unofficial free API
async function gTranslate(text, tl) {
  const url = 'https://translate.googleapis.com/translate_a/single'
    + '?client=gtx&sl=ko&tl=' + encodeURIComponent(tl)
    + '&dt=t&q=' + encodeURIComponent(text);
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  // data[0] = array of [translated_segment, original_segment, ...]
  return data[0].map(s => s[0]).join('');
}

async function translateOne(text, code) {
  const el = document.getElementById('t-' + code);
  const card = document.getElementById('sc-' + code);
  if (!el) return;
  if (!text.trim()) { el.textContent = ''; return; }
  el.className = 'sc-text wait';
  el.textContent = '번역 중...';
  const l = LANGS.find(x => x.code === code);
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const result = await gTranslate(text, l.gt);
      el.className = 'sc-text';
      el.textContent = result;
      if (card) { card.classList.add('flash'); setTimeout(() => card.classList.remove('flash'), 900); }
      return;
    } catch(e) {
      if (attempt < 2) await new Promise(r => setTimeout(r, 800));
    }
  }
  el.className = 'sc-text wait';
  el.textContent = '번역 실패 (네트워크 확인)';
}

function triggerAll(text) {
  if (debounce) clearTimeout(debounce);
  debounce = setTimeout(() => {
    if (text.trim()) sel.forEach(code => translateOne(text, code));
  }, 600);
}

function toggleRec() { isRec ? stopRec() : startRec(); }

function startRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Chrome 또는 Edge 브라우저를 사용해 주세요.'); return; }
  recog = new SR();
  recog.lang = 'ko-KR';
  recog.continuous = true;
  recog.interimResults = true;
  recog.onstart = () => {
    isRec = true;
    document.getElementById('micBtn').classList.add('on');
    document.getElementById('rdot').classList.add('live');
    document.getElementById('stLabel').textContent = '음성 인식 중...';
  };
  recog.onend = () => { if (isRec) recog.start(); };
  recog.onerror = e => {
    const msg = e.error === 'not-allowed' ? '마이크 권한 필요' : '오류: ' + e.error;
    document.getElementById('stLabel').textContent = msg;
    isRec = false;
    document.getElementById('micBtn').classList.remove('on');
    document.getElementById('rdot').classList.remove('live');
  };
  recog.onresult = e => {
    let interim = '';
    finalTxt = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTxt += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const kt = document.getElementById('korText');
    const display = finalTxt + interim;
    kt.innerHTML = display
      ? (finalTxt + (interim ? `<span class="itr">${interim}</span>` : ''))
      : '<span style="color:rgba(255,255,255,0.2);font-weight:400;font-size:13px;">듣고 있습니다...</span>';
    triggerAll(display);
  };
  recog.start();
}

function stopRec() {
  isRec = false;
  if (recog) { recog.onend = null; recog.stop(); recog = null; }
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('rdot').classList.remove('live');
  document.getElementById('stLabel').textContent = '중지됨';
}

function clearAll() {
  finalTxt = '';
  document.getElementById('korText').innerHTML = '<span style="color:rgba(255,255,255,0.2);font-weight:400;font-size:13px;">마이크 버튼을 눌러 시작하세요</span>';
  sel.forEach(code => { const el = document.getElementById('t-' + code); if (el) el.textContent = ''; });
}

// URL param: ?bcast=1&langs=en,ja,zh&layout=grid
(function() {
  const p = new URLSearchParams(location.search);
  if (p.get('bcast') === '1') {
    document.body.classList.add('bcast');
    const ls = p.get('langs'); if (ls) sel = new Set(ls.split(','));
    const ly = p.get('layout'); if (ly) layout = ly;
    document.getElementById('setupScreen').style.display = 'none';
    const ov = document.getElementById('overlayScreen');
    ov.style.display = 'block';
    ov.className = layout === 'grid' ? 'grid' : '';
    buildCards();
    startRec();
  }
})();
</script>
</body>
</html>
